name: "Push Docs Check"
on: 
- push

jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v1
    - name : install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install .[docs]
    - name : build docs
      run: |
        cd docs
        make html
