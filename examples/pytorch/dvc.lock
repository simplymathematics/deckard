    - path: ./config/
      hash: md5
      md5: abb4f31ae89640cb3925ac84f4371d9d.dir
      size: 3699
      nfiles: 15
    outs:
    - path: .deckard_rc
      hash: md5
      md5: f80e8817bc0f38954d61017cd6363c13
      size: 89
  simple_example:
    cmd: deckard && echo "Deckard ran successfully!" > deckard.log
