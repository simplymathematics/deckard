    - path: ./config/
      hash: md5
      md5: 48c884ea429ce54f746563d3abc5fa1b.dir
      size: 3826
      nfiles: 15
    outs:
    - path: .deckard_rc
      hash: md5
      md5: f80e8817bc0f38954d61017cd6363c13
      size: 89
  simple_example:
    cmd: deckard && echo "Deckard ran successfully!" > deckard.log
