      size: 24310
    - path: .deckard_rc
      hash: md5
      md5: f80e8817bc0f38954d61017cd6363c13
      size: 89
    outs:
    - path: deckard.log
      hash: md5
      md5: ac96bb25847dd3d698d84a7b4b7ffd1c
      size: 26
  generate_data@torch_mnist:
    cmd: "deckard data=torch_mnist  ~model ~attack files.model_file=null files.attack_file=null
      experiment_name=torch_mnist\n"
    deps:
    - path: ../../deckard/data/pytorch.py
