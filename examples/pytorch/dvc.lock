schema: '2.0'
stages:
  set_config_paths:
    cmd: "echo \"export DECKARD_CONFIG_DIR=./config\" > .deckard_rc && echo \"export
      DECKARD_DEFAULT_CONFIG_FILE=torch_default.yaml\" >> .deckard_rc && source .deckard_rc\n"
    deps:
    - path: ./config/
      hash: md5
      md5: 268fdcd7c47d36ea40790312e1a33116.dir
      size: 3467
      nfiles: 15
    outs:
    - path: .deckard_rc
      hash: md5
      md5: f80e8817bc0f38954d61017cd6363c13
      size: 89
  simple_example:
    cmd: deckard && echo "Deckard ran successfully!" > deckard.log
