schema: '2.0'
stages:
  set_config_paths:
    cmd: "export DECKARD_CONFIG_DIR=\"~/deckard/examples/config\" && export DECKARD_DEFAULT_CONFIG_FILE=\"\
      default.yaml\" && echo $DECKARD_CONFIG_DIR > .config_paths_set && echo $DECKARD_DEFAULT_CONFIG_FILE
      >> .config_paths_set\n"
    deps:
    - path: ../../config/default.yaml
      hash: md5
      md5: 7dd34162f1c0181b54dabb935e4748b7
      size: 82
    params:
      ../../config/default.yaml:
        defaults:
        - _self_
        - data: classification
        - model: logistic
        - attack: hsj
    outs:
    - path: .config_paths_set
      hash: md5
      md5: e18a657d997e2179d54a96cd4f7e1cf8
      size: 39
  generate_data@adult:
    cmd: "deckard  data=adult  +files.data_file=data/adult.pkl  +files.score_file=scores/data/adult.json
      ~model  ~attack\n"
