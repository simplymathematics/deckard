      md5: 35a8bb3071a34d53505cb05e548b1dc2
      size: 126
    params:
      ../../config/default.yaml:
        defaults:
        - _self_
        - data: classification
        - model: logistic
        - attack: hsj
        - files:
        experiment_name: default
    outs:
    - path: .deckard_rc
      hash: md5
      md5: d9ec184ac23a216473577fedd725be07
      size: 87
