schema: '2.0'
stages:
  set_config_paths:
    cmd: "echo \"export DECKARD_CONFIG_DIR=../../config\" > .deckard_rc && echo \"\
      export DECKARD_DEFAULT_CONFIG_FILE=default.yaml\" >> .deckard_rc && source .deckard_rc\n"
    deps:
    - path: ../../config/default.yaml
      hash: md5
      md5: 38a4125a70ccbab5ff645ba27dc4d028
      size: 1079
    params:
      ../../config/default.yaml:
        defaults:
        - _self_
        - data: adult
        - model: rf
        - attack: hsj
        - files:
        - override hydra/sweeper: optuna
        directions:
        - maximize
        - maximize
        experiment_name: adult_rf_hsj
        hydra:
          run:
            dir: outputs/logs/${experiment_name}
          sweep:
            dir: outputs/logs/
            subdir: ${hydra.sweeper.study_name}/${hydra.job.num}
          sweeper:
            study_name: evasion_attack
            storage: sqlite:///optuna.db
            direction: ${directions}
            sampler:
              _target_: optuna.samplers.TPESampler
              consider_prior: true
              prior_weight: 1.0
              consider_magic_clip: true
              consider_endpoints: false
              n_startup_trials: 10
              n_ei_candidates: 24
              multivariate: true
              warn_independent_sampling: true
            _target_: 
              hydra_plugins.hydra_optuna_sweeper.optuna_sweeper.OptunaSweeper
            n_trials: 100
            n_jobs: 1
            params:
              ++model.model_params.n_estimators: int(range(1,1000))
              ++model.model_params.max_depth: int(range(1,101))
              ++model.model_params.max_leaf_nodes: int(range(2,1000))
        optimizers:
        - accuracy
        - evasion_accuracy
    outs:
    - path: .deckard_rc
      hash: md5
      md5: d9ec184ac23a216473577fedd725be07
      size: 87
  generate_data@adult:
    cmd: "deckard  data=adult  +files.data_file=outputs/data/adult.pkl  +files.score_file=outputs/scores/data/adult.json
      experiment_name=adult ~model  ~attack ~directions ~optimizers\n"
    deps:
    - path: ../../../deckard/data/
      hash: md5
      md5: 309f4e4fb5c67607e7b3bbd8a9785d45.dir
      size: 98476
      nfiles: 4
    - path: .deckard_rc
      hash: md5
      md5: d9ec184ac23a216473577fedd725be07
      size: 87
    params:
      ../../config/data/adult.yaml:
        _target_: deckard.DataConfig
        alias: adult
        classifier: true
        dataset_name: adult
        pipeline:
          preprocessor:
            name: sklearn.preprocessing.StandardScaler
            with_mean: false
            with_std: true
          feature_selector:
            name: sklearn.feature_selection.VarianceThreshold
            threshold: 0.001
        random_state: 42
        stratify: false
        test_size: 0.2
    outs:
    - path: outputs/data/adult.pkl
      hash: md5
      md5: f3e3c0bc69f955c7fd56131ddecf1275
      size: 45627001
    - path: outputs/scores/data/adult.json
      hash: md5
      md5: 6d3785da67a71a19d7973fd772029737
      size: 6725
  generate_data@classification:
    cmd: "deckard  data=classification  +files.data_file=outputs/data/classification.pkl\
      \  +files.score_file=outputs/scores/data/classification.json experiment_name=classification
      ~model  ~attack ~directions ~optimizers\n"
