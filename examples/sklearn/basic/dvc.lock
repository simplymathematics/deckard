      md5: 7dd34162f1c0181b54dabb935e4748b7
      size: 82
    params:
      ../../config/default.yaml:
        defaults:
        - _self_
        - data: classification
        - model: logistic
        - attack: hsj
    outs:
    - path: .deckard_rc
      hash: md5
      md5: d9ec184ac23a216473577fedd725be07
      size: 87
