    - path: ../../config/default.yaml
      hash: md5
      md5: 7dd34162f1c0181b54dabb935e4748b7
      size: 82
    params:
      ../../config/default.yaml:
        defaults:
        - _self_
        - data: classification
        - model: logistic
        - attack: hsj
    outs:
    - path: .config_paths_set
      hash: md5
      md5: e18a657d997e2179d54a96cd4f7e1cf8
      size: 39
