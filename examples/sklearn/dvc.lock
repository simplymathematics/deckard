schema: '2.0'
stages:
  set_config_paths:
    cmd: "echo \"export DECKARD_CONFIG_DIR=./config\" > .deckard_rc && echo \"export
      DECKARD_DEFAULT_CONFIG_FILE=default.yaml\" >> .deckard_rc && source .deckard_rc\n"
    deps:
    - path: ./config/default.yaml
      hash: md5
      md5: c3fc9af0b3eb2ff2b39a424f71d5470d
      size: 1092
    params:
      config/default.yaml:
        attack_alias: hsj
        data_alias: adult
        defaults:
        - _self_
        - data: adult
        - model: rf
        - defense: class-labels
        - attack: hsj
        - files:
        - override hydra/sweeper: optuna
        - override hydra/sweeper/sampler: random
        defense_alias: class-labels
        directions:
        - maximize
        - maximize
        - maximize
        experiment_name: ???
        hydra:
          run:
            dir: outputs/logs/${experiment_name}
          sweep:
            dir: outputs/logs/
            subdir: ${hydra.sweeper.study_name}/${hydra.job.num}
          sweeper:
            _target_: 
              hydra_plugins.hydra_optuna_sweeper.optuna_sweeper.OptunaSweeper
            study_name: 
              ${data_alias}_${model_alias}_${defense_alias}_${attack_alias}
            storage: sqlite:///optuna.db
            direction: ${directions}
            sampler:
              _target_: optuna.samplers.RandomSampler
              seed: 42
            n_trials: 100
            n_jobs: 1
            params: ${search}
        model_alias: rf
        optimizers:
        - accuracy
        - evasion_accuracy
        - attack_generation_time
        search: ${merge:${file:search/models/${model_alias}.yaml:model_search}, 
          ${file:search/defenses/${defense_alias}.yaml:model_search},}
    outs:
    - path: .deckard_rc
      hash: md5
      md5: 19021154ecc61513bd7a0f05b88e1a95
      size: 83
  generate_data@classification:
    cmd: "deckard  data=classification  +files.data_file=outputs/data/classification.pkl\
      \  +files.score_file=outputs/scores/data/classification.json experiment_name=classification
      ~model  ~attack ~directions ~optimizers\n"
    deps:
    - path: ../../deckard/data/
      hash: md5
      md5: 1a0d25e087332a0695f8a77f9550128c.dir
      size: 111620
      nfiles: 5
    - path: .deckard_rc
      hash: md5
      md5: 19021154ecc61513bd7a0f05b88e1a95
      size: 83
    params:
      config/data/classification.yaml:
        _target_: deckard.DataConfig
        alias: make_classification
        classifier: true
        data_params:
          n_samples: 10000
          n_features: 20
          n_informative: 15
          n_redundant: 5
          n_classes: 2
          random_state: 42
        dataset_name: make_classification
    outs:
    - path: outputs/data/classification.pkl
      hash: md5
      md5: d6afc7c0cf84b5c4aea36c182541a3c1
      size: 3394116
    - path: outputs/scores/data/classification.json
      hash: md5
      md5: 621337184a3a17928cd5fbe374bd833b
      size: 2229
  defend_rf@classification-rf-class_labels:
    cmd: deckard data=classification 
      +files.data_file=outputs/data/classification.pkl 
      +files.model_file=outputs/models/classification/rf_defended_class_labels.pkl
      +files.score_file=outputs/scores/defenses/classification/rf_class_labels.json
      model=rf.yaml model.alias=rf_class_labels defense=class_labels.yaml 
      experiment_name=classification_rf_defended_class_labels ~attack 
