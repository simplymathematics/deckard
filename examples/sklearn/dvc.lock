schema: '2.0'
stages:
  set_config_paths:
    cmd: "echo \"export DECKARD_CONFIG_DIR=./config\" > .deckard_rc && echo \"export
      DECKARD_DEFAULT_CONFIG_FILE=default.yaml\" >> .deckard_rc && source .deckard_rc\n"
    deps:
    - path: ./config/default.yaml
      hash: md5
      md5: 9c9a4344178e576be40e25877e74180c
      size: 1099
    params:
      config/default.yaml:
        defaults:
        - _self_
        - data: adult
        - model: rf
        - attack: hsj
        - files:
        - override hydra/sweeper: optuna
        directions:
        - maximize
        - maximize
        experiment_name: adult_rf_hsj
        hydra:
          run:
            dir: outputs/logs/${experiment_name}
          sweep:
            dir: outputs/logs/
            subdir: ${hydra.sweeper.study_name}/${hydra.job.num}
          sweeper:
            study_name: evasion_attack
            storage: sqlite:///optuna.db
            direction: ${directions}
            sampler:
              _target_: optuna.samplers.TPESampler
              consider_prior: true
              prior_weight: 1.0
              consider_magic_clip: true
              consider_endpoints: false
              n_startup_trials: 10
              n_ei_candidates: 24
              multivariate: true
              warn_independent_sampling: true
            _target_: 
              hydra_plugins.hydra_optuna_sweeper.optuna_sweeper.OptunaSweeper
            n_trials: 1000
            n_jobs: 1
            params:
              ++model.model_params.n_estimators: int(range(1,1000))
              ++model.model_params.max_depth: int(range(1,101))
              ++model.model_params.max_leaf_nodes: int(range(2,1000))
        optimizers:
        - accuracy
        - evasion_accuracy
    outs:
    - path: .deckard_rc
      hash: md5
      md5: 19021154ecc61513bd7a0f05b88e1a95
      size: 83
  generate_data@adult:
    cmd: "deckard  data=adult  +files.data_file=outputs/data/adult.pkl  +files.score_file=outputs/scores/data/adult.json
      experiment_name=adult ~model  ~attack ~directions ~optimizers\n"
    deps:
    - path: ../../deckard/data/
      hash: md5
      md5: 2cf544ce27497ae5215c6887a7b950fb.dir
      size: 100263
      nfiles: 4
    - path: .deckard_rc
      hash: md5
      md5: 19021154ecc61513bd7a0f05b88e1a95
      size: 83
    params:
      config/data/adult.yaml:
        _target_: deckard.DataConfig
        alias: adult
        classifier: true
        dataset_name: adult
        random_state: 42
        stratify: false
        test_size: 0.2
    outs:
    - path: outputs/data/adult.pkl
      hash: md5
      md5: 1642960d2f4e2f8f529093baaa9916e8
      size: 14514664
    - path: outputs/scores/data/adult.json
      hash: md5
      md5: b602f41a793b1524591ad25c617e6406
      size: 326
  generate_data@classification:
    cmd: "deckard  data=classification  +files.data_file=outputs/data/classification.pkl\
