stages:
  set_config_paths:
      cmd: >
        echo "export DECKARD_CONFIG_DIR=./config" > .deckard_rc &&
        echo "export DECKARD_DEFAULT_CONFIG_FILE=default.yaml" >> .deckard_rc &&
        source .deckard_rc
      outs: 
        - .deckard_rc
      deps:
        - ./config/default.yaml
      params:
        - ./config/default.yaml:
  simple_example:
      cmd: deckard experiment_name=default && echo "Deckard ran successfully!" > deckard.log
      outs:
        - deckard.log
      deps:
        - .deckard_rc # Here to ensure config paths are set before running deckard
        - ../../deckard
        - ./config/default.yaml
  generate_data:
      foreach:
        - adult
        - classification
        - diabetes
        - digits
        - regression
        - kdd_nsl
        - ddos
        - sms_spam
        - truthseeker
      do:
        cmd: >
          deckard 
          data=${item} 
          +files.data_file=outputs/data/${item}.pkl 
          +files.score_file=outputs/scores/data/${item}.json
          experiment_name=${item}
          ~model 
          ~attack
          ~directions
          ~optimizers
        outs:
          - outputs/data/${item}.pkl
        metrics:
          - outputs/scores/data/${item}.json
        deps:
          - .deckard_rc
          - ../../deckard/data/
        params:
          - ./config/data/${item}.yaml:
          ################################################
          #            Command Explanation:             #
          ################################################
          # deckard  <-- Calls the deckard CLI tool
          # data=${item}  <-- Specifies the dataset to be used in this iteration. See ./config/data/ for available datasets.
          # +files.data_file=data/${item}.pkl <-- Specifies the output path for the generated data file.
          # +files.score_file=scores/${item}.json <-- Specifies the output path for the score file.
          # ~model <-- Drops default model configuration.
          # ~attack <-- Drops default attack configuration.
          ################################################
  train:
      matrix:
        data: 
          - adult
          - classification
          - digits
        model:
          - rf
          - svc
          - logistic
      cmd: >
        deckard 
        data=${item.data} 
        +files.data_file=outputs/data/${item.data}.pkl 
        +files.model_file=outputs/models/${item.data}/${item.model}.pkl
        +files.score_file=outputs/scores/models/${item.data}/${item.model}.json
        experiment_name=${item.data}_${item.model}
        model=${item.model}.yaml 
        ~attack
        ~directions
        ~optimizers
      outs:
        - outputs/models/${item.data}/${item.model}.pkl
      metrics:
        - outputs/scores/models/${item.data}/${item.model}.json
      deps:
        - outputs/data/${item.data}.pkl
        - ../../deckard/model
      params:
        - ./config/model/${item.model}.yaml:
        - ./config/data/${item.data}.yaml:
        ################################################
        #            Command Explanation:             #
        ################################################
        # deckard  <-- Calls the deckard CLI tool
        # model=${item}  <-- Specifies the model to be trained for this iteration. See ./config/model/ for available models.
        # +files.data_file=data/${item}.pkl <-- Specifies the input data file path.
        # +files.model_file=models/${item}/model.pkl <-- Specifies the output path for the trained model file.
        # +files.score_file=scores/models/${item}/model.json <-- Specifies the output path for the model score file.
        # model=rf.yaml  <-- Specifies the model configuration to be used.
        # ~attack <-- Drops default attack configuration.
  attack_rf:
    matrix:
      data: 
        - adult
      model:
        - rf
        - svc
        - logistic
      attack:
        # Evasion attacks
        - hsj
        - boundary
        # TODO: Poisoning attacks
        # Membership inference attacks
        - membership
        # Attribute inference attacks
        - attribute-bb
    cmd: >
      deckard 
      data=${item.data} 
      +files.data_file=outputs/data/${item.data}.pkl 
      +files.model_file=outputs/models/${item.data}/${item.model}.pkl
      +files.score_file=outputs/scores/attacks/${item.data}/${item.model}/${item.attack}.json
      model=${item.model}.yaml 
      attack=${item.attack}.yaml
      experiment_name=${item.data}_${item.model}_${item.attack}
      ~directions
      ~optimizers
    metrics:
      - outputs/scores/attacks/${item.data}/${item.model}/${item.attack}.json
    deps:
      - outputs/data/${item.data}.pkl
      - outputs/models/${item.data}/${item.model}.pkl
  defend_rf:
    matrix:
      data: 
        - adult
        - classification
        - digits
      model:
        - rf
        - svc
        - logistic
      defense:
          # Postprocessing defenses
          - class_labels
          - gaussian_noise
          - high_confidence
          - reverse_sigmoid
          - rounded
          # Preprocessing defenses
          - cut_mix
          - cutout
          - feature_squeezing
          - gaussian_augmentation
          - jpeg_compression
          - label_smoothing
          - mixup
          - resample
          - spatial_smoothing
    cmd:
      deckard 
      data=${item.data} 
      +files.data_file=outputs/data/${item.data}.pkl 
      +files.model_file=outputs/models/${item.data}/${item.model}_defended_${item.defense}.pkl
      +files.score_file=outputs/scores/defenses/${item.data}/${item.model}_${item.defense}.json
      model=${item.model}.yaml 
      model.alias=${item.model}_${item.defense}
      +defense=${item.defense}.yaml
      experiment_name=${item.data}_${item.model}_defended_${item.defense}
      ~attack
      ~directions
      ~optimizers
    outs:
      - outputs/models/${item.data}/${item.model}_defended_${item.defense}.pkl
    metrics:
      - outputs/scores/defenses/${item.data}/${item.model}_${item.defense}.json
    deps:
      - outputs/data/${item.data}.pkl
      - ../../deckard/model
    params:
      - ./config/model/rf.yaml:
      - ./config/defense/${item.defense}.yaml:
      - ./config/data/${item.data}.yaml:
