vars:
  - conf/knn.yaml:hydra
  - conf/plots.yaml:line_plot
  - conf/plots.yaml:cat_plot
  # - conf/condensed_plots.yaml:line_plot
  # - conf/clean.yaml:params
  - conf/clean.yaml:fillna
  - conf/clean.yaml:replace
stages:
  ##############################################################################
  # These stages use the dvc API to run a single experiment at a time using a
  # deckard.Experiment object. This parses this file, saves the default hydra configuration
  # to params.yaml, and then runs the experiment with the given parameters.
  # This can be used to define a stage that runs a single experiment, or a stage for the
  # optimisation using the optimise.py script and the hydrasweeper API. This API is primarily used for
  # development and testing, as it is easier to run a single experiment at a time and debug it using
  # DVC's git-like features to track changes and minimise run a 

  # This stage will parse the conf/knn.yaml file and save it to params.yaml
  # In addition, it will define a schema stage that will will 
  # 1. Determine the file paths for the data and model files (if specified)
  # 2. Run the experiment with the given parameters
  # 3. Save the results to the given file paths (will always save a score_dict_file, and a params_file to files.directory/files.reports/stage/)
  # 4. Save a 'params.yaml' file with the scores (Always)
  # 5. Save the predictions to the given file paths (if specified)
  # 6. Save the probabilities to the given file paths (if specified)
  # 7. Save the (final) losses to the given file paths (if specified)
  # 8. Save the train/test labels to the given file paths (if specified)

  # You can arbitrarily define parameters in the 'conf' folder.
  # To parse the parameters, you can use the 'hydra' API to define a schema for the parameters
  # Or run `deckard.layers.parse` to parse the parameters and save them to a file.  
  ##############################################################################
  prerequisites:
    desc: "This stage will install the required packages and set up the environment for the experiment. It will also check that the data files are in place and that the parameters are correctly defined."
    cmd: pip install -r requirements.txt && echo "Dependency check passed." > ./dependency_check.log
    outs:
      - dependency_check.log
    deps:
      - requirements.txt
  ##############################################################################
  # These stages use the hydra sweeper API to run a grid search over the specified parameters. This is used to run the full grid search for the paper, and can be used to
  data:
    desc: "This stage will parse the conf/knn.yaml file and save it to params.yaml"
    cmd: python data_prep.py
    outs:
      - raw_data/
    deps:
      - data_prep.py
      - dependency_check.log
  parse_params:
    cmd: python -m deckard.layers.parse  --config_file knn
    deps:
      - conf/data
      - conf/model/ncd_knn.yaml
      - conf/files
      - conf/scorers
      - conf/knn.yaml
    outs:
      - params.yaml:
          cache: true
          desc : "Parsed parameters for the experiment"
          persist: true
          push : true
  train:
    cmd: python -m deckard.layers.experiment train
    metrics:
    - ${files.directory}/${files.reports}/train/${files.name}/${files.score_dict_file}
    outs:
    - ${files.directory}/${files.data_dir}/${files.data_file}${files.data_type}/:
        cache: true
        persist: true
        push: true
    params:
    - data
    - model
    - scorers
    - files
    - dataset
    - model_name
    - algorithm
    deps:
    - params.yaml # The default configuration file, as defined in the 'parse_params' stage
    - raw_data/ # Raw data
  ##############################################################################
  grid_search_precompute:
    matrix: 
      train_size: [1000] 
      dataset: [ddos, kdd_nsl, sms_spam, truthseeker]
      metric : [gzip, bz2, brotli, levenshtein, ratio, hamming]
      fold : [0, 1, 2, 3, 4]
      algorithm : # modified, symmetric, name
        - [False, False, "Vanilla"]
        - [False, True, "Assumed"] 
        - [True, True, "Enforced"]
        - [True, "average", "Average"]
    cmd: >-
      python -m deckard.layers.optimise
      stage=train
      algorithm="${item.algorithm[2]}"
      data=${item.dataset}
      data.sample.test_size=200
      data.sample.train_size=${item.train_size}
      dataset=${item.dataset}
      data.sample.fold=${item.fold}
      files=multi
      model_name=knn
      model=ncd_knn
      model.init.symmetric=${item.algorithm[1]}
      model.init.modified=${item.algorithm[0]}
      model.init.metric=${item.metric}
      model.init.transform=None
      model.init.distance_matrix_train=output/${item.dataset}/distance_matrix/${item.metric}/${item.algorithm[2]}/train-${item.train_size}-${data.sample.test_size}-${data.sample.random_state}${item.fold}.npz
      model.init.distance_matrix_test=output/${item.dataset}/distance_matrix/${item.metric}/${item.algorithm[2]}/test-${item.train_size}-${data.sample.test_size}-${data.sample.random_state}${item.fold}.npz
      files.directory=output/${item.dataset}
      files.reports=reports/precomputed/knn/${item.algorithm[2]}/${item.train_size}/${item.fold}/${item.metric}/
      hydra.sweeper.n_trials=1
      --config-name knn
    deps:
      - conf/knn.yaml # Only needs one distance matrix per fold/metric/algorithm to tune all the models
      - params.yaml
      - raw_data/
      - gzip_classifier.py
    outs:
        - output/${item.dataset}/distance_matrix/${item.metric}/${item.algorithm[2]}/train-${item.train_size}-${data.sample.test_size}-${data.sample.random_state}${item.fold}.npz:
            cache: false
            persist: true
            push: true
        - output/${item.dataset}/distance_matrix/${item.metric}/${item.algorithm[2]}/test-${item.train_size}-${data.sample.test_size}-${data.sample.random_state}${item.fold}.npz:
            cache: false
            persist: true
            push: true
        - output/${item.dataset}/logs/precomputed/knn/${item.algorithm[2]}/${item.train_size}/${item.fold}/${item.metric}/:
            cache: false
            persist: true
            push: true
        - output/${item.dataset}/reports/precomputed/knn/${item.algorithm[2]}/${item.train_size}/${item.fold}/${item.metric}/:
            cache: false
            persist: true
            push: true
    params:
      - conf/knn.yaml:
          - hydra
  ##############################################################################
  grid_search:
    matrix: 
      train_size: [1000] # 10, 20, 35, 60, 100, 200, 500  200, 500
      dataset: [ddos, kdd_nsl, sms_spam, truthseeker] 
      model_name : [knn,logistic, svc] # knn, svc, logistic
      algorithm : # modified, symmetric, name
        - [False, False, "Vanilla"]
        - [False, True, "Assumed"] 
        - [True, True, "Enforced"]
        - [True, "average", "Average"]
    cmd: >-
      python -m deckard.layers.optimise
      stage=train
      data=${item.dataset}
      data.sample.test_size=200
      data.sample.train_size=${item.train_size}
      dataset=${item.dataset}
      model_name=${item.model_name}
      model.init.symmetric=${item.algorithm[1]}
      model.init.modified=${item.algorithm[0]}
      files=multi
      files.directory=output/${item.dataset}
      hydra.sweeper.n_trials=-1
      algorithm="${item.algorithm[2]}"
      --config-name ${item.model_name}
      --multirun
    deps:
      - conf/${item.model_name}.yaml
      - params.yaml
      - raw_data/
      - output/${item.dataset}/distance_matrix
    outs:
        - output/${item.dataset}/logs/search/${item.model_name}/${item.algorithm[2]}/${item.train_size}/study.csv:
            cache: false
            persist: false
        - output/${item.dataset}/reports/search/${item.model_name}/${item.algorithm[2]}/${item.train_size}/:
            cache: false
            persist: true
    params:
      - conf/${item.model_name}.yaml:
          - hydra
  # #############################################################################
  grid_search_hamming:
    matrix: 
      train_size: [1000] # 10, 20, 35, 60, 100, 200, 500  200, 500
      dataset: [ddos, kdd_nsl, sms_spam, truthseeker] 
      model_name : [knn,logistic, svc] # knn, svc, logistic
      algorithm : # modified, symmetric, name
        - [False, False, "Vanilla"]
        - [False, True, "Assumed"] 
        - [True, True, "Enforced"]
        - [True, "average", "Average"]
    cmd: >-
      python -m deckard.layers.optimise
      stage=train
      data=${item.dataset}
      data.sample.test_size=200
      data.sample.train_size=${item.train_size}
      dataset=${item.dataset}
      model_name=${item.model_name}
      model.init.symmetric=${item.algorithm[1]}
      model.init.modified=${item.algorithm[0]}
      model.init.metric=ratio
      files=hamming
      files.directory=output/${item.dataset}
      hydra.sweeper.n_trials=-1
      algorithm="${item.algorithm[2]}"
      --config-name hamming_${item.model_name}
      --multirun
    deps:
      - conf/hamming_${item.model_name}.yaml
      - params.yaml
      - raw_data/
      - output/${item.dataset}/distance_matrix
    outs:
        - output/${item.dataset}/logs/hamming/${item.model_name}/${item.algorithm[2]}/${item.train_size}/study.csv:
            cache: false
            persist: false
        - output/${item.dataset}/reports/hamming/${item.model_name}/${item.algorithm[2]}/${item.train_size}/:
            cache: false
            persist: true
    params:
      - conf/${item.model_name}.yaml:
          - hydra
  # #############################################################################
  find_best:
    matrix:
      dataset : [ddos, kdd_nsl, sms_spam, truthseeker]
      algorithm : [Vanilla, Assumed, Enforced, Average]
      model : [knn, svc, logistic]
      metric : [gzip, bz2, brotli, levenshtein, ratio, hamming]
    deps:
      - output/${item.dataset}/reports/search/${item.model}/${item.algorithm}/
      - conf/model/ncd_${item.model}.yaml
      - conf/${item.model}.yaml
      - find_best.py
    cmd: >-
      python -m find_best
      -n ${item.dataset}_${item.model}_${item.algorithm}
      -p sqlite:///output/optuna.db
      -d conf/model/ncd_${item.model}.yaml
      -c conf/${item.model}.yaml
      -s model.init.metric=${item.metric} model.init.transform!=None
      -o best/${item.dataset}_${item.model}_${item.algorithm}_${item.metric}_kernel.yaml
      -x model.init.distance_matrix_train model.init.distance_matrix_test files.directory data.sample.fold
    outs:
    - best/${item.dataset}_${item.model}_${item.algorithm}_${item.metric}_kernel.yaml
  # #############################################################################
  find_best_distance:
    matrix:
      dataset : [ddos, kdd_nsl, sms_spam, truthseeker]
      algorithm : [Vanilla, Assumed, Enforced, Average]
      model : [knn, svc, logistic]
      metric : [gzip, bz2, brotli, levenshtein, ratio, hamming]
    deps:
      - output/${item.dataset}/reports/search/${item.model}/${item.algorithm}/
      - conf/model/ncd_${item.model}.yaml
      - conf/${item.model}.yaml
      - find_best.py
    cmd: >-
      python -m find_best
      -n ${item.dataset}_${item.model}_${item.algorithm}
      -p sqlite:///output/optuna.db
      -d conf/model/ncd_${item.model}.yaml
      -c conf/${item.model}.yaml
      -s model.init.metric=${item.metric} model.init.transform=None
      -o best/${item.dataset}_${item.model}_${item.algorithm}_${item.metric}_distance.yaml
      -x model.init.distance_matrix_train model.init.distance_matrix_test files.directory data.sample.fold
    outs:
    - best/${item.dataset}_${item.model}_${item.algorithm}_${item.metric}_distance.yaml
  # #############################################################################
  find_best_hamming:
    matrix:
      dataset : [ddos, kdd_nsl, sms_spam, truthseeker]
      algorithm : [Vanilla, Assumed, Enforced, Average]
      model : [knn, svc, logistic]
      metric : [ratio]
    deps:
      - output/${item.dataset}/reports/search/${item.model}/${item.algorithm}/
      - conf/model/ncd_${item.model}.yaml
      - conf/${item.model}.yaml
      - find_best.py
    cmd: >-
      python -m find_best
      -n ${item.dataset}_${item.model}_${item.algorithm}_hamming
      -p sqlite:///output/optuna.db
      -d conf/model/ncd_${item.model}.yaml
      -c conf/${item.model}.yaml
      -s model.init.metric=${item.metric} model.init.transform!=None
      -o best/${item.dataset}_${item.model}_${item.algorithm}_${item.metric}_hamming.yaml
      -x model.init.distance_matrix_train model.init.distance_matrix_test files.directory data.sample.fold
    outs:
    - best/${item.dataset}_${item.model}_${item.algorithm}_${item.metric}_hamming.yaml
  # ##############################################################################
  refit_precompute:
    matrix: 
      train_size: [1000] 
      dataset: [ddos, kdd_nsl, sms_spam, truthseeker]
      metric : [gzip, bz2, brotli, levenshtein, ratio, hamming]
      algorithm : # modified, symmetric, name
        - [False, False, "Vanilla"]
        - [False, True, "Assumed"] 
        - [True, True, "Enforced"]
        - [True, "average", "Average"]
    cmd: >-
      python -m deckard.layers.optimise
      stage=train
      algorithm="${item.algorithm[2]}"
      data=${item.dataset}
      data.sample.test_size=200
      data.sample.train_size=${item.train_size}
      data.sample.fold=-1
      dataset=${item.dataset}
      files=multi
      model_name=knn
      model=ncd_knn
      model.init.symmetric=${item.algorithm[1]}
      model.init.modified=${item.algorithm[0]}
      model.init.metric=${item.metric}
      model.init.transform=None
      model.init.distance_matrix_train=output/${item.dataset}/distance_matrix/${item.metric}/${item.algorithm[2]}/train-${item.train_size}-${data.sample.test_size}-${data.sample.random_state}-1.npz
      model.init.distance_matrix_test=output/${item.dataset}/distance_matrix/${item.metric}/${item.algorithm[2]}/test-${item.train_size}-${data.sample.test_size}-${data.sample.random_state}-1.npz
      files.directory=output/${item.dataset}
      files.reports=reports/precomputed/knn/${item.algorithm[2]}/${item.train_size}/-1/${item.metric}/
      hydra.sweeper.n_trials=1
      hydra.sweeper.study_name=${item.dataset}_knn_${item.algorithm[2]}_refit
      --config-name knn
    deps:
      - conf/knn.yaml # Only needs one distance matrix per fold/metric/algorithm to tune all the models
      - params.yaml
      - raw_data/
      - gzip_classifier.py
    outs:
        - output/${item.dataset}/distance_matrix/${item.metric}/${item.algorithm[2]}/train-${item.train_size}-${data.sample.test_size}-${data.sample.random_state}-1.npz:
            cache: false
            persist: true
            push: true
        - output/${item.dataset}/distance_matrix/${item.metric}/${item.algorithm[2]}/test-${item.train_size}-${data.sample.test_size}-${data.sample.random_state}-1.npz:
            cache: false
            persist: true
            push: true
        - output/${item.dataset}/logs/precomputed/knn/${item.algorithm[2]}/${item.train_size}/-1/${item.metric}/:
            cache: false
            persist: true
            push: true
        - output/${item.dataset}/reports/precomputed/knn/${item.algorithm[2]}/${item.train_size}/-1/${item.metric}/:
            cache: false
            persist: true
            push: true
    params:
      - conf/knn.yaml:
          - hydra
  ################################################################################################
  refit_best:
    matrix:
      train_size: [1000] 
      dataset: [ddos, kdd_nsl, sms_spam, truthseeker]
      algorithm : [Vanilla, Assumed, Enforced, Average]
      model : [knn, svc, logistic]
      metric : [gzip, bz2, brotli, levenshtein, ratio, hamming]
      suffix : [distance, kernel]
    deps:
      - output/${item.dataset}/reports/search/${item.model}/${item.algorithm}/
      - best/${item.dataset}_${item.model}_${item.algorithm}_${item.metric}_${item.suffix}.yaml
      - output/${item.dataset}/distance_matrix/${item.metric}/${item.algorithm}/train-${item.train_size}-200-0-1.npz
      - output/${item.dataset}/distance_matrix/${item.metric}/${item.algorithm}/test-${item.train_size}-200-0-1.npz
    cmd: >-
      python -m deckard.layers.optimise
      stage=train
      algorithm="${item.algorithm}"
      data.sample.test_size=200
      data.sample.train_size=${item.train_size}
      dataset=${item.dataset}
      data.sample.fold=-1
      model_name=${item.model}
      files.directory=output/${item.dataset}
      files.reports=reports/refit_${item.suffix}/${item.model}/${item.algorithm}/${item.metric}/${item.train_size}/
      hydra.run.dir=output/${item.dataset}/logs/refit_${item.suffix}/${item.model}/${item.algorithm}/${item.metric}/${item.train_size}/
      ++hydra.sweeper.study_name=${item.dataset}_${item.model}_${item.algorithm}_refit_${item.suffix}
      --config-name ${item.dataset}_${item.model}_${item.algorithm}_${item.metric}_${item.suffix}
      --config-dir best
    outs:
    - output/${item.dataset}/reports/refit_${item.suffix}/${item.model}/${item.algorithm}/${item.metric}/${item.train_size}/
    - output/${item.dataset}/logs/refit_${item.suffix}/${item.model}/${item.algorithm}/${item.metric}/${item.train_size}/
  ##############################################################################
  refit_best_hamming:
    matrix:
      train_size: [1000] 
      dataset: [ddos, kdd_nsl, sms_spam, truthseeker]
      algorithm : [Vanilla, Assumed, Enforced, Average]
      model : [knn, svc, logistic]
      metric : [ratio]
      suffix : [hamming]
    deps:
      - output/${item.dataset}/reports/search/${item.model}/${item.algorithm}/
      - best/${item.dataset}_${item.model}_${item.algorithm}_${item.metric}_${item.suffix}.yaml
      - output/${item.dataset}/distance_matrix/${item.metric}/${item.algorithm}/train-${item.train_size}-200-0-1.npz
      - output/${item.dataset}/distance_matrix/${item.metric}/${item.algorithm}/test-${item.train_size}-200-0-1.npz
    cmd: >-
      python -m deckard.layers.optimise
      stage=train
      algorithm="${item.algorithm}"
      data.sample.test_size=200
      data.sample.train_size=${item.train_size}
      dataset=${item.dataset}
      data.sample.fold=-1
      model_name=${item.model}
      files.directory=output/${item.dataset}
      files.reports=reports/refit_${item.suffix}/${item.model}/${item.algorithm}/${item.metric}/${item.train_size}/
      hydra.run.dir=output/${item.dataset}/logs/refit_${item.suffix}/${item.model}/${item.algorithm}/${item.metric}/${item.train_size}/
      ++hydra.sweeper.study_name=${item.dataset}_${item.model}_${item.algorithm}_refit_${item.suffix}
      --config-name ${item.dataset}_${item.model}_${item.algorithm}_${item.metric}_${item.suffix}
      --config-dir best
    outs:
    - output/${item.dataset}/reports/refit_${item.suffix}/${item.model}/${item.algorithm}/${item.metric}/${item.train_size}/
    - output/${item.dataset}/logs/refit_${item.suffix}/${item.model}/${item.algorithm}/${item.metric}/${item.train_size}/
  ##############################################################################
  compile:
    matrix:
      dataset: [ddos, kdd_nsl, sms_spam, truthseeker] 
      model : [knn, svc, logistic, ] #condense/knn, condense/svc, condense/logistic
      stage : [refit_kernel, refit_distance, refit_hamming]
    deps:
      - output/${item.dataset}/reports/${item.stage}/${item.model}/
    outs:
    - output/${item.dataset}/${item.stage}/${item.model}.csv
    cmd: >-
      python -m deckard.layers.compile 
      --report_folder output/${item.dataset}/reports/${item.stage}/${item.model}/
      --results_file output/${item.dataset}/${item.stage}/${item.model}.csv
  ##############################################################################
  compile_precomputed:
    matrix:
      dataset: [ddos, kdd_nsl, sms_spam, truthseeker] 
      model : [knn] # Only one model is needed because the distance matrix is the same for all models
      stage : [precomputed]
    deps:
      - output/${item.dataset}/reports/${item.stage}/${item.model}/
    outs:
    - output/${item.dataset}/${item.stage}/${item.model}.csv
    cmd: >-
      python -m deckard.layers.compile 
      --report_folder output/${item.dataset}/reports/${item.stage}/${item.model}/
      --results_file output/${item.dataset}/${item.stage}/${item.model}.csv
  ##############################################################################  
  clean:
    matrix:
      dataset: [ddos, kdd_nsl, sms_spam, truthseeker] 
      model : [knn, svc, logistic,] 
      stage : [refit_kernel, refit_distance, refit_hamming]
    deps: 
      - output/${item.dataset}/${item.stage}/${item.model}.csv
    cmd: >-
      python -m deckard.layers.clean_data 
      -i output/${item.dataset}/${item.stage}/${item.model}.csv
      -o output/${item.dataset}/plots/${item.stage}/${item.model}.csv
      -c conf/clean.yaml
    outs:
      - output/${item.dataset}/plots/${item.stage}/${item.model}.csv
    params:
      - conf/clean.yaml:
        - replace
        - drop_values
        - replace_cols
        - fillna
  ##############################################################################
  clean_precomputed:
    matrix: 
      dataset: [ddos, kdd_nsl, sms_spam, truthseeker] 
      model : [knn] # Only one model is needed because the distance matrix is the same for all models
      stage : [precomputed]
    deps:
      - output/${item.dataset}/${item.stage}/${item.model}.csv
    cmd: >-
      python -m deckard.layers.clean_data 
      -i output/${item.dataset}/${item.stage}/${item.model}.csv
      -o output/${item.dataset}/plots/${item.stage}/${item.model}.csv
      -c conf/clean.yaml
    outs:
      - output/${item.dataset}/plots/${item.stage}/${item.model}.csv
    params:
      - conf/clean.yaml:
        - replace
        - drop_values
        - replace_cols
        - fillna
  ##############################################################################
  merge_search:
    matrix:
      dataset: [ddos, kdd_nsl, sms_spam, truthseeker] 
      stage : [refit_kernel, refit_distance, refit_hamming]
    deps:
      - output/${item.dataset}/plots/${item.stage}/knn.csv
      - output/${item.dataset}/plots/${item.stage}/logistic.csv
      - output/${item.dataset}/plots/${item.stage}/svc.csv
    cmd: >-
      python merge.py
      --big_dir output/${item.dataset}/plots/
      --data_file ${item.stage}/knn.csv
      --little_dir_data_file ${item.stage}/logistic.csv ${item.stage}/svc.csv
      --output_folder output/${item.dataset}/plots
      --output_file ${item.stage}_merged.csv
    outs:
      - output/${item.dataset}/plots/${item.stage}_merged.csv
  ##############################################################################
  merge_search_datasets:
    foreach:
      - refit_hamming
      - refit_distance
      - refit_kernel
      - precomputed
    do:
      cmd: >-
        python merge.py
        --big_dir output/
        --little_dir output/
        --data_file ddos/plots/${item}_merged.csv
        --little_dir_data_file  kdd_nsl/plots/${item}_merged.csv sms_spam/plots/${item}_merged.csv truthseeker/plots/${item}_merged.csv 
        --output_file ${item}_merged.csv
        --output_folder output/combined/plots/
      deps:
        - output/sms_spam/plots/${item}_merged.csv
        - output/kdd_nsl/plots/${item}_merged.csv
        - output/ddos/plots/${item}_merged.csv
        - output/truthseeker/plots/${item}_merged.csv
      outs:
        - output/combined/plots/${item}_merged.csv
  ##############################################################################
  plot:
    cmd: >-
      python plots.py
    deps:
      - output/combined/plots/refit_hamming_merged.csv
      - output/combined/plots/refit_kernel_merged.csv
      - output/combined/plots/refit_distance_merged.csv
      - output/combined/plots/precomputed_merged.csv
      - plots.py
    plots:
      - output/combined/plots/accuracy_vs_algorithm.pdf
      - output/combined/plots/accuracy_vs_kernel_function.pdf
      - output/combined/plots/accuracy_vs_kernel.pdf
      - output/combined/plots/accuracy_vs_model.pdf
      - output/combined/plots/distance_matrix_time_vs_algorithm.pdf
      - output/combined/plots/pred_time_vs_algorithm.pdf
    outs:
      - output/combined/plots/search_averaged.csv:
          cache: false
          persist: false
          push: true
  