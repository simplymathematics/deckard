            _target_: 
              hydra_plugins.hydra_joblib_launcher.joblib_launcher.JoblibLauncher
            n_jobs: ${..sweeper.n_jobs}
            prefer: processes
            verbose: 0
            pre_dispatch: 2*${hydra.sweeper.n_jobs}
